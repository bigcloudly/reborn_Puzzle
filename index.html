<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas 拼圖遊戲</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* 防止出現滾動條 */
            background-color: #ffffff; /* 調整為白色背景 */
            font-family: sans-serif;
        }
        /* 新增標題樣式 */
        #gameTitle {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 32px;
            color: #333;
            pointer-events: none; /* 避免擋住滑鼠點擊 */
            margin: 0;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none; /* 防止觸控裝置拖曳時滾動頁面 */
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #333; /* 調整為深色以適應白底 */
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <h1 id="gameTitle">宏恩長老教會主日學2026復活節闖關活動</h1>
    <div id="loading">載入圖片中...</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const loadingText = document.getElementById('loading');

        // 動態排版參數
        let BOARD_W, BOARD_H, BOARD_X, BOARD_Y;
        let ERROR_MARGIN_X, ERROR_MARGIN_Y;

        // 載入圖片
        const img = new Image();
        img.src = '127627.jpg';

        // 遊戲狀態與資料
        let pieces = [];
        let draggedPiece = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let hoveredZone = null;
        let currentActiveZone = null; // 新增：追蹤目前正在進行拼圖的區塊
        
        // 點擊判定用
        let pointerDownPos = { x: 0, y: 0 };
        let pointerDownTime = 0;
        let isDragging = false;

        // 通關動畫參數
        let isWin = false;
        let winScale = 1;
        let winGlow = 0;

        // 定義5大區塊 (依照螺旋版面切割設計)
        const zones = [
            { id: 1, x: 0,   y: 0,   w: 0.7, h: 0.3, clicked: false },
            { id: 2, x: 0.7, y: 0,   w: 0.3, h: 0.7, clicked: false },
            { id: 3, x: 0.3, y: 0.7, w: 0.7, h: 0.3, clicked: false },
            { id: 4, x: 0,   y: 0.3, w: 0.3, h: 0.7, clicked: false },
            { id: 5, x: 0.3, y: 0.3, w: 0.4, h: 0.4, clicked: false } 
        ];

        // 視窗縮放處理，確保畫面盡可能滿版
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            if (!img.width) return;

            const imgAspect = img.width / img.height;
            const screenAspect = canvas.width / canvas.height;

            // 讓拼圖板佔據畫面的 85% 以保留上方標題空間
            if (screenAspect > imgAspect) {
                BOARD_H = canvas.height * 0.85;
                BOARD_W = BOARD_H * imgAspect;
            } else {
                BOARD_W = canvas.width * 0.9;
                BOARD_H = BOARD_W / imgAspect;
            }

            // 置中顯示，將 Y 軸稍微往下移避開標題
            BOARD_X = (canvas.width - BOARD_W) / 2;
            BOARD_Y = (canvas.height - BOARD_H) / 2 + 20;

            // 5% 誤差容忍度
            ERROR_MARGIN_X = BOARD_W * 0.03;
            ERROR_MARGIN_Y = BOARD_H * 0.03;
        }

        window.addEventListener('resize', resizeCanvas);

        img.onload = () => {
            loadingText.style.display = 'none';
            resizeCanvas();
            requestAnimationFrame(gameLoop);
        };

        img.onerror = () => {
            loadingText.innerText = "圖片載入失敗，使用測試底圖";
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 1000; tempCanvas.height = 600;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.fillStyle = '#add8e6'; tCtx.fillRect(0,0,1000,600);
            tCtx.fillStyle = '#000'; tCtx.font = '40px Arial';
            tCtx.fillText("測試底圖 (找不到 127627.jpg)", 250, 300);
            img.src = tempCanvas.toDataURL();
        };

        // 取得精確座標
        function getPointerPos(e) {
            const clientX = e.clientX ?? e.touches[0].clientX;
            const clientY = e.clientY ?? e.touches[0].clientY;
            return { x: clientX, y: clientY };
        }

        // 即時運算碎片的絕對目標位置
        function getPieceAbs(p) {
            return {
                tx: BOARD_X + p.rx * BOARD_W,
                ty: BOARD_Y + p.ry * BOARD_H,
                w: p.rw * BOARD_W,
                h: p.rh * BOARD_H
            };
        }

        // 繪製單一拼圖邊緣
        function drawJigsawEdge(ctx, x1, y1, x2, y2, edgeType) {
            if (edgeType === 0) {
                ctx.lineTo(x2, y2);
                return;
            }
            
            const dx = x2 - x1;
            const dy = y2 - y1;
            const len = Math.hypot(dx, dy);
            const dirX = dx / len;
            const dirY = dy / len;
            
            const normX = dirY;
            const normY = -dirX;
            const sign = edgeType;
            
            const pt = (d, n) => ({
                x: x1 + dirX * d * len + normX * sign * n * len,
                y: y1 + dirY * d * len + normY * sign * n * len
            });

            ctx.lineTo(pt(0.38, 0).x, pt(0.38, 0).y);
            ctx.bezierCurveTo(
                pt(0.40, 0.05).x, pt(0.40, 0.05).y,
                pt(0.30, 0.20).x, pt(0.30, 0.20).y,
                pt(0.50, 0.20).x, pt(0.50, 0.20).y
            );
            ctx.bezierCurveTo(
                pt(0.70, 0.20).x, pt(0.70, 0.20).y,
                pt(0.60, 0.05).x, pt(0.60, 0.05).y,
                pt(0.62, 0).x, pt(0.62, 0).y
            );
            ctx.lineTo(x2, y2);
        }

        function buildPiecePath(ctx, baseX, baseY, w, h, edges) {
            ctx.beginPath();
            ctx.moveTo(baseX, baseY);
            drawJigsawEdge(ctx, baseX, baseY, baseX + w, baseY, edges.top); 
            drawJigsawEdge(ctx, baseX + w, baseY, baseX + w, baseY + h, edges.right); 
            drawJigsawEdge(ctx, baseX + w, baseY + h, baseX, baseY + h, edges.bottom); 
            drawJigsawEdge(ctx, baseX, baseY + h, baseX, baseY, edges.left); 
            ctx.closePath();
        }

        // 獨立繪製單一碎片的函式
        function drawPiece(p) {
            const abs = getPieceAbs(p);

            // 鎖定狀態強制歸位(避免視窗縮放導致錯位)
            if (p.locked) {
                p.x = abs.tx; p.y = abs.ty;
            }

            ctx.save();
            
            // 以碎片中心點做旋轉
            ctx.translate(p.x + abs.w/2, p.y + abs.h/2);
            ctx.rotate(p.rotation * Math.PI / 180);
            ctx.translate(-(abs.tx + abs.w/2), -(abs.ty + abs.h/2));
            
            buildPiecePath(ctx, abs.tx, abs.ty, abs.w, abs.h, p.edges);
            
            // 陰影投射
            if (p === draggedPiece) {
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 15;
                ctx.shadowOffsetX = 8;
                ctx.shadowOffsetY = 8;
            } else if (!p.locked) {
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetX = 3;
                ctx.shadowOffsetY = 3;
            }
            ctx.fillStyle = "white"; 
            ctx.fill(); 
            
            ctx.shadowColor = 'transparent';
            
            // 貼上圖片
            ctx.save();
            ctx.clip(); 
            ctx.drawImage(img, 0, 0, img.width, img.height, BOARD_X, BOARD_Y, BOARD_W, BOARD_H);
            ctx.restore();

            // 外框線
            if (!p.locked) {
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
            } else {
                ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            ctx.restore();
        }

        // 點擊大區塊產生小拼圖
        function generatePieces(zone) {
            zone.clicked = true;
            currentActiveZone = zone; // 設定當前作用中的區塊
            
            const cols = 3;
            const rows = 3;

            const hEdges = []; 
            for (let r = 0; r < rows - 1; r++) {
                const row = [];
                for (let c = 0; c < cols; c++) {
                    row.push(Math.random() > 0.5 ? 1 : -1);
                }
                hEdges.push(row);
            }

            const vEdges = []; 
            for (let r = 0; r < rows; r++) {
                const row = [];
                for (let c = 0; c < cols - 1; c++) {
                    row.push(Math.random() > 0.5 ? 1 : -1);
                }
                vEdges.push(row);
            }

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const rw = zone.w / cols;
                    const rh = zone.h / rows;
                    const rx = zone.x + c * rw;
                    const ry = zone.y + r * rh;

                    const topEdge = (r === 0) ? 0 : -hEdges[r-1][c];
                    const bottomEdge = (r === rows - 1) ? 0 : hEdges[r][c];
                    const leftEdge = (c === 0) ? 0 : -vEdges[r][c-1];
                    const rightEdge = (c === cols - 1) ? 0 : vEdges[r][c];

                    // 在整個畫面上隨機散落
                    const randomX = Math.random() * (canvas.width - (rw * BOARD_W));
                    const randomY = Math.random() * (canvas.height - (rh * BOARD_H));
                    // 隨機賦予 0, 90, 180, 270 角度
                    const randomRotation = [0, 90, 180, 270][Math.floor(Math.random() * 4)];

                    pieces.push({
                        rx: rx, ry: ry, rw: rw, rh: rh,
                        x: randomX, y: randomY,   
                        rotation: randomRotation,
                        locked: false,
                        edges: { top: topEdge, bottom: bottomEdge, left: leftEdge, right: rightEdge }
                    });
                }
            }
        }

        // 檢查通關條件
        function checkWinCondition() {
            const allClicked = zones.every(z => z.clicked);
            const allLocked = pieces.length === 45 && pieces.every(p => p.locked);
            if (allClicked && allLocked) {
                isWin = true;
            }
        }

        // --- 事件監聽 ---
        
        canvas.addEventListener('pointerdown', (e) => {
            if (isWin) return;
            const pos = getPointerPos(e);
            
            pointerDownPos = pos;
            pointerDownTime = Date.now();
            isDragging = false;

            // 1. 判斷是否點擊小拼圖
            for (let i = pieces.length - 1; i >= 0; i--) {
                const p = pieces[i];
                if (!p.locked) {
                    const abs = getPieceAbs(p);
                    ctx.save();
                    // 考慮旋轉中心進行測試
                    ctx.translate(p.x + abs.w/2, p.y + abs.h/2);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.translate(-(abs.tx + abs.w/2), -(abs.ty + abs.h/2));
                    
                    buildPiecePath(ctx, abs.tx, abs.ty, abs.w, abs.h, p.edges);
                    const hit = ctx.isPointInPath(pos.x, pos.y);
                    ctx.restore();

                    if (hit) {
                        draggedPiece = p;
                        dragOffsetX = pos.x - p.x;
                        dragOffsetY = pos.y - p.y;
                        
                        pieces.splice(i, 1);
                        pieces.push(p);
                        canvas.style.cursor = 'grabbing';
                        return;
                    }
                }
            }

            // 2. 判斷是否點擊大區塊
            const hasActivePieces = pieces.some(p => !p.locked);

            // 若沒有尚未完成的碎片，才允許點選新的區塊
            if (!hasActivePieces) {
                for (let i = 0; i < zones.length; i++) {
                    const z = zones[i];
                    const zx = BOARD_X + z.x * BOARD_W;
                    const zy = BOARD_Y + z.y * BOARD_H;
                    const zw = z.w * BOARD_W;
                    const zh = z.h * BOARD_H;

                    if (!z.clicked && pos.x >= zx && pos.x <= zx + zw && pos.y >= zy && pos.y <= zy + zh) {
                        generatePieces(z);
                        hoveredZone = null;
                        canvas.style.cursor = 'default';
                        return;
                    }
                }
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if (isWin) return;
            const pos = getPointerPos(e);

            if (draggedPiece) {
                if (Math.hypot(pos.x - pointerDownPos.x, pos.y - pointerDownPos.y) > 5) {
                    isDragging = true;
                }
                draggedPiece.x = pos.x - dragOffsetX;
                draggedPiece.y = pos.y - dragOffsetY;
            } else {
                let foundHover = false;
                const hasActivePieces = pieces.some(p => !p.locked);

                if (!hasActivePieces) {
                    for (let i = 0; i < zones.length; i++) {
                        const z = zones[i];
                        if (z.clicked) continue;
                        const zx = BOARD_X + z.x * BOARD_W;
                        const zy = BOARD_Y + z.y * BOARD_H;
                        const zw = z.w * BOARD_W;
                        const zh = z.h * BOARD_H;

                        if (pos.x >= zx && pos.x <= zx + zw && pos.y >= zy && pos.y <= zy + zh) {
                            hoveredZone = z;
                            canvas.style.cursor = 'pointer';
                            foundHover = true;
                            break;
                        }
                    }
                }

                if (!foundHover) {
                    hoveredZone = null;
                    canvas.style.cursor = 'default';
                }
            }
        });

        window.addEventListener('pointerup', () => {
            if (draggedPiece) {
                const timeElapsed = Date.now() - pointerDownTime;
                
                if (!isDragging && timeElapsed < 300) {
                    draggedPiece.rotation = (draggedPiece.rotation + 90) % 360;
                }

                if (draggedPiece.rotation === 0) {
                    const abs = getPieceAbs(draggedPiece);
                    const diffX = Math.abs(draggedPiece.x - abs.tx);
                    const diffY = Math.abs(draggedPiece.y - abs.ty);

                    if (diffX <= ERROR_MARGIN_X && diffY <= ERROR_MARGIN_Y) {
                        draggedPiece.x = abs.tx;
                        draggedPiece.y = abs.ty;
                        draggedPiece.locked = true;
                        
                        // 檢查是否當前區塊碎片已全數歸位
                        const stillHasActive = pieces.some(p => !p.locked);
                        if (!stillHasActive) {
                            currentActiveZone = null; // 清空當前作用中區塊狀態
                        }

                        checkWinCondition();
                    }
                }

                draggedPiece = null;
                canvas.style.cursor = 'default';
            }
        });

        // --- 遊戲渲染迴圈 ---
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!isWin) {
                // 1. 繪製區塊的底色 (包含尚未點擊的預設色與當前作用中的金黃色)
                zones.forEach(z => {
                    const zx = BOARD_X + z.x * BOARD_W, zy = BOARD_Y + z.y * BOARD_H;
                    const zw = z.w * BOARD_W, zh = z.h * BOARD_H;

                    if (currentActiveZone) {
                        if (z === currentActiveZone) {
                            ctx.fillStyle = 'rgba(255, 215, 0, 0.5)'; // 金黃色底色
                            ctx.fillRect(zx, zy, zw, zh);
                            ctx.strokeStyle = '#888';
                            ctx.lineWidth = 2;
                            ctx.strokeRect(zx, zy, zw, zh);
                        } else if (!z.clicked) {
                            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                            ctx.fillRect(zx, zy, zw, zh);
                            ctx.strokeStyle = '#888';
                            ctx.lineWidth = 2;
                            ctx.strokeRect(zx, zy, zw, zh);
                        }
                    } else {
                        if (!z.clicked) {
                            ctx.fillStyle = (hoveredZone === z) ? 'rgba(52, 152, 219, 0.4)' : 'rgba(0, 0, 0, 0.05)';
                            ctx.fillRect(zx, zy, zw, zh);
                            ctx.strokeStyle = '#888';
                            ctx.lineWidth = 2;
                            ctx.strokeRect(zx, zy, zw, zh);
                        }
                    }
                });

                // 2. 繪製已經鎖定 (拼好) 的碎片
                pieces.filter(p => p.locked).forEach(p => drawPiece(p));

                // 3. 繪製白色半透明遮罩 (如果目前有進行中的區塊，遮罩其餘所有的區塊)
                if (currentActiveZone) {
                    zones.forEach(z => {
                        if (z !== currentActiveZone) {
                            const zx = BOARD_X + z.x * BOARD_W, zy = BOARD_Y + z.y * BOARD_H;
                            const zw = z.w * BOARD_W, zh = z.h * BOARD_H;
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; // 白色半透明覆蓋
                            ctx.fillRect(zx, zy, zw, zh);
                        }
                    });
                }

                // 4. 繪製尚未鎖定的碎片 (確保畫在白色遮罩的上方，避免混淆)
                pieces.filter(p => !p.locked && p !== draggedPiece).forEach(p => drawPiece(p));
                
                // 5. 繪製正在拖曳的碎片 (確保在畫面最頂層)
                if (draggedPiece) drawPiece(draggedPiece);

            } else {
                // 通關動畫：放大圖片並加上金色光暈
                winScale += (1.05 - winScale) * 0.05; 
                winGlow += 0.05; 

                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(winScale, winScale);
                
                ctx.shadowColor = `rgba(255, 215, 0, ${0.5 + Math.sin(winGlow)*0.4})`;
                ctx.shadowBlur = 40;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                
                ctx.drawImage(img, 0, 0, img.width, img.height, -BOARD_W/2, -BOARD_H/2, BOARD_W, BOARD_H);
                ctx.restore();
            }

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
